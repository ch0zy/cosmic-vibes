    // ── Lunar date via anchored CNY lookup ──────────────────────────────────
    const CNY = [
      [2010,1,14],[2011,1,3],[2012,0,23],[2013,1,10],[2014,0,31],[2015,1,19],
      [2016,1,8],[2017,0,28],[2018,1,16],[2019,1,5],[2020,0,25],[2021,1,12],
      [2022,1,1],[2023,0,22],[2024,1,10],[2025,0,29],[2026,1,17],[2027,1,6],
    ];
    const LUNAR_MONTHS_2025 = [30,29,30,29,30,30,29,30,29,30,30,29];
    const LUNAR_MONTHS_2026 = [30,29,30,29,30,29,30,30,29,30,29,30];

    function getLunarDate(date) {
      const lunarMonthNames = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","冬月","腊月"];
      const lunarDayNames = ["初一","初二","初三","初四","初五","初六","初七","初八","初九","初十",
        "十一","十二","十三","十四","十五","十六","十七","十八","十九","二十",
        "廿一","廿二","廿三","廿四","廿五","廿六","廿七","廿八","廿九","三十"];
      let cnyDate = null, cnyYear = null;
      for (let i = CNY.length - 1; i >= 0; i--) {
        const [y, m, d] = CNY[i], c = new Date(y, m, d);
        if (c <= date) { cnyDate = c; cnyYear = y; break; }
      }
      if (!cnyDate) return { lunarMonth: "正月", lunarDay: "初一" };
      const daysSinceCNY = Math.floor((date - cnyDate) / 86400000);
      const months = cnyYear === 2025 ? LUNAR_MONTHS_2025 : cnyYear === 2026 ? LUNAR_MONTHS_2026 : null;
      let remaining = daysSinceCNY, monthIdx = 0;
      if (months) {
        while (monthIdx < months.length - 1 && remaining >= months[monthIdx]) { remaining -= months[monthIdx]; monthIdx++; }
      } else {
        monthIdx = Math.floor(daysSinceCNY / 29.53);
        remaining = daysSinceCNY - Math.floor(monthIdx * 29.53);
      }
      return { lunarMonth: lunarMonthNames[monthIdx % 12], lunarDay: lunarDayNames[Math.min(remaining, 29)] };
    }

    function getChineseZodiac(year) {
      return ["Rat","Ox","Tiger","Rabbit","Dragon","Snake","Horse","Goat","Monkey","Rooster","Dog","Pig"][(year - 1900) % 12];
    }

    function getHoroscope(month, day) {
      if ((month===3&&day>=21)||(month===4&&day<=19)) return "Aries";
      if ((month===4&&day>=20)||(month===5&&day<=20)) return "Taurus";
      if ((month===5&&day>=21)||(month===6&&day<=20)) return "Gemini";
      if ((month===6&&day>=21)||(month===7&&day<=22)) return "Cancer";
      if ((month===7&&day>=23)||(month===8&&day<=22)) return "Leo";
      if ((month===8&&day>=23)||(month===9&&day<=22)) return "Virgo";
      if ((month===9&&day>=23)||(month===10&&day<=22)) return "Libra";
      if ((month===10&&day>=23)||(month===11&&day<=21)) return "Scorpio";
      if ((month===11&&day>=22)||(month===12&&day<=21)) return "Sagittarius";
      if ((month===12&&day>=22)||(month===1&&day<=19)) return "Capricorn";
      if ((month===1&&day>=20)||(month===2&&day<=18)) return "Aquarius";
      return "Pisces";
    }

    function getLunarZodiacYear(date) {
      const y = date.getFullYear();
      const cny = CNY.find(([yr]) => yr === y);
      if (!cny) return y;
      return date < new Date(cny[0], cny[1], cny[2]) ? y - 1 : y;
    }

    // ── Sub-components ──────────────────────────────────────────────────────
    const LuckBar = ({ label, value, icon }) => (

    // ── Main App ────────────────────────────────────────────────────────────
    const App = () => {
      const [birthDate, setBirthDate]   = useState("");
      const [zodiac, setZodiac]         = useState(null);
      const [horoscope, setHoroscope]   = useState(null);
      const [reading, setReading]       = useState(null);
      const [loading, setLoading]       = useState(false);
      const [luckScores, setLuckScores] = useState(null);
      const [brightSpots, setBrightSpots] = useState(null);
      const [gentleHeeds, setGentleHeeds] = useState(null);
      const [lunarInfo, setLunarInfo]   = useState(null);

      const today = new Date();
      const dateStr = today.toLocaleDateString("en-US", { weekday:"long", year:"numeric", month:"long", day:"numeric" });

      useEffect(() => { setLunarInfo(getLunarDate(today)); }, []);

      const handleSubmit = async () => {
        if (!birthDate) return;
        const d = new Date(birthDate);
        const z = getChineseZodiac(getLunarZodiacYear(d));
        const h = getHoroscope(d.getMonth() + 1, d.getDate());
        setZodiac(z); setHoroscope(h);
        setLoading(true); setReading(null); setLuckScores(null);
        setBrightSpots(null); setGentleHeeds(null);

        const { lunarMonth, lunarDay } = getLunarDate(today);
        const prompt = `You are a poetic cosmic advisor weaving Chinese astrology and Western horoscopes into gentle, warm guidance.
Today: ${dateStr}. Chinese lunar date: ${lunarMonth}${lunarDay}.
User's Chinese Zodiac: ${z}. Western sign: ${h}.

Write a personalized daily cosmic reading. Respond ONLY in this exact JSON (no markdown, no extra text):
{
  "reading": "A poetic 2-3 sentence daily vibe.",
  "brightSpots": "2-3 sentences on what flows with ease today — opportunities, inspired moments, gifts.",
  "gentleHeeds": "2-3 sentences on what to move mindfully around — gentle, non-alarming tone.",
  "love": 72, "career": 65, "wellbeing": 80, "creativity": 55
}`;
        try {
          const res = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000,
              messages: [{ role: "user", content: prompt }] })
          });
          const data = await res.json();
          const text = data.content.map(i => i.text || "").join("").replace(/```json|```/g, "").trim();
          const p = JSON.parse(text);
          setReading(p.reading); setBrightSpots(p.brightSpots); setGentleHeeds(p.gentleHeeds);
          setLuckScores({ love: p.love, career: p.career, wellbeing: p.wellbeing, creativity: p.creativity });
        } catch (e) {
          setReading("The stars are resting... please try again in a moment.");
        }
        setLoading(false);
      };

      return (
        <div className="app">
          <CosmicDecor/>
          <div className="container">

            {/* Header */}
            <div className="header">
              <div className="header-title">
                <MoonSVG size={22}/>
                <h1>Cosmic Vibes</h1>
                <SunSVG size={22}/>
              </div>
              <p className="header-date">{dateStr}</p>
              {lunarInfo && <p className="header-lunar">农历 · {lunarInfo.lunarMonth}{lunarInfo.lunarDay}</p>}
            </div>

            {/* Birth Date */}
            <div className="card">
              <label className="input-label">Your Birth Date</label>
              <div className="input-row">
                <input
                  type="date"
                  value={birthDate}
                  onChange={e => setBirthDate(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && birthDate && !loading && handleSubmit()}
                  max={new Date().toISOString().split("T")[0]}
                  className="date-input"
                />
                <button
                  onClick={handleSubmit}
                  disabled={!birthDate || loading}
                  className={`read-btn ${birthDate ? "active" : ""}`}
                >
                  {loading ? "..." : "Read ✦"}
                </button>
              </div>
            </div>

            {/* Signs */}
            {zodiac && horoscope && (
              <div className="signs-row">
                <div className="card sign-card">
                  <ZodiacAnimalSVG animal={zodiac} size={60}/>
                  <div className="sign-sublabel">Chinese Zodiac</div>
                  <div className="sign-name">Year of the {zodiac}</div>
                </div>
                <div className="card sign-card">
                  <HoroscopeSVG sign={horoscope} size={60}/>
                  <div className="sign-sublabel">Star Sign</div>
                  <div className="sign-name">{horoscope}</div>
                </div>
              </div>
            )}

            {/* Loader */}
            {loading && (
              <div className="card card-white loader-card">
                <div className="loader-dots">
                  <div className="dot" style={{ animationDelay: "0s" }}/>
                  <div className="dot" style={{ animationDelay: "0.2s" }}/>
                  <div className="dot" style={{ animationDelay: "0.4s" }}/>
                </div>
                <p className="loader-text">reading the stars for you…</p>
              </div>
            )}

            {/* Today's Reading */}
            {reading && (
              <div className="card card-white">
                <SectionHeader icon={<SparkSVG size={14}/>} label="Today's Reading"/>
                <p className="reading-text">{reading}</p>
              </div>
            )}

            {/* What's Working in Your Favour */}
            {brightSpots && (
              <div className="card">
                <SectionHeader icon={<SunSVG size={14}/>} label="✦ What's Working in Your Favour"/>
                <p className="body-text">{brightSpots}</p>
              </div>
            )}

            {/* What to Tread Lightly Around */}
            {gentleHeeds && (
              <div className="card">
                <SectionHeader icon={<MoonSVG size={14}/>} label="◎ What to Tread Lightly Around"/>
                <p className="body-text">{gentleHeeds}</p>
              </div>
            )}

            {/* Luck Forecast */}
            {luckScores && (
              <div className="card">
                <SectionHeader icon={<StarSVG size={14}/>} label="Luck Forecast"/>
                <LuckBar label="Love"       value={luckScores.love}       icon="♡"/>
                <LuckBar label="Career"     value={luckScores.career}     icon="✦"/>
                <LuckBar label="Wellbeing"  value={luckScores.wellbeing}  icon="◎"/>
                <LuckBar label="Creativity" value={luckScores.creativity} icon="✿"/>
              </div>
            )}

            {/* Idle */}
            {!zodiac && !loading && (
              <div className="idle">
                <div className="idle-icons">
                  <StarSVG size={18}/><MoonSVG size={18}/><SparkSVG size={18}/><SunSVG size={18}/>
                </div>
                <p className="idle-text">Enter your birth date to reveal your cosmic blueprint</p>
              </div>
            )}

            <div className="footer">✦ as above, so below ✦</div>
          </div>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
  </script>
</body>
</html>
